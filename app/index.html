<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bangladesh Medicine - Download Now</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-green: #4ade80;
      --dark-green: #16a34a;
    }
    body {
      background: #f9fafb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #1f2937;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 3rem 1rem;
      background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
      color: white;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: -100px;
      left: -100px;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s infinite alternate ease-in-out;
    }
    .hero::after {
      content: "";
      position: absolute;
      bottom: -120px;
      right: -120px;
      width: 350px;
      height: 350px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      animation: float 8s infinite alternate ease-in-out;
    }
    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(20px); }
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      max-width: 600px;
    }
    .download-btn img {
      height: 55px;
      margin: 0.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .download-btn img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    .app-mockup {
      max-width: 320px;
      margin-top: 2.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .features {
      padding: 4rem 1.5rem;
      text-align: center;
    }
    .features h2 {
      font-weight: 700;
      margin-bottom: 2rem;
      color: #064e3b;
    }
    .feature-box {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }
    .feature-box:hover {
      transform: translateY(-8px);
    }
    .feature-icon {
      font-size: 2.5rem;
      color: var(--primary-green);
      margin-bottom: 1rem;
    }
    footer {
      background: #111827;
      color: #d1d5db;
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
  <h1>BDM <br> Trusted Wholesale Partner</h1>
  <p>Buy medicines in bulk at wholesale prices. Easy ordering and fast delivery — all in one app.</p>
  
  <div class="download-btn">
    <a href="https://api.bdmpharmacy.store/media/downloads/bdm.apk" download>
      <img 
        src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" 
        alt="Download APK"
        style="height: 60px;"
      >
    </a>
  </div>
</section>


  <!-- FOOTER -->
  <footer>
    © 2025 Bangladesh Medicine (BDM). All rights reserved.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
